name: Build-config injection guard

# Fails the build if the EtherHiding / manus-connector supply-chain backdoor is
# present in any build-config file, or if .gitignore stops ignoring .env*.
# Runs on every push and PR so a re-injected branch can never merge or deploy.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan build configs for injection
        run: bash scripts/security/scan-build-config-injection.sh
